name: Netledger CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.25.1

      - name: Run tests
        run: make test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install eBPF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r)

      - name: Verify tools
        run: |
          which clang
          which llvm-strip

      - name: Load versions from file
        id: versions
        run: |
          echo "AGENT_VERSION=$(cat versions.json | jq -r '.agent')" >> $GITHUB_ENV
          echo "CLASSIFIER_VERSION=$(cat versions.json | jq -r '.classifier')" >> $GITHUB_ENV
          echo "REPO=ghcr.io/acll19/netledger" >> $GITHUB_ENV
      
      - name: Build Agent
        run: |
          VERSION=${{ env.AGENT_VERSION }} HASH=${{ env.HASH }} REPO=${{ env.REPO }} make build-agent

      - name: Upload eBPF object
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: netledger-bpf
          path: ./internal/agent/bpf/netledger_bpfel.o

      - name: Build Classifier
        run: |
          VERSION=${{ env.CLASSIFIER_VERSION }} HASH=${{ env.HASH }} REPO=${{ env.REPO }} make build-classifier
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
  load-vm-amd64:
    runs-on: ubuntu-latest
    name: eBPF Load AMD Test
    needs: build
    strategy:
      fail-fast: false
      matrix:
        kernel:
          # https://quay.io/repository/lvh-images/kind?tab=tags
          - "6.6-20260603.072225-amd64"
          # - "6.1-20260603.042119-amd64" not supported
          # - "5.15-20260603.072225-amd64" # not supported
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Download eBPF object
        uses: actions/download-artifact@a9bc5e6ef2cb54c177f32aa5726adaa15e7e2d59 # v3.1.0
        with:
          name: netledger-bpf
          path: ./internal/agent/bpf/
      - name: Load NetLedger Agent in ${{ matrix.kernel }}
        uses: cilium/little-vm-helper@v0.0.30
        with:
          test-name: load-netledger
          image: "kind"
          image-version: ${{ matrix.kernel }}
          host-mount: ${{ github.workspace }}
          install-dependencies: "true"
          ssh-connect-wait-timeout: "2"
          cmd: |
            set -euo pipefail

            # print kernel version
            echo "Kernel Version: "
            uname -a

            # goto where host is mounted
            echo ""
            cd /host
            ls -lah

            echo ""
            sudo bpftool prog loadall \
              ./internal/agent/bpf/netledger_bpfel.o \
              /sys/fs/bpf/netledger \
              2>&1 | tee /tmp/bpf-load.log

            sudo bpftool prog show

  load-vm-arm64:
    runs-on: ubuntu-latest
    name: eBPF ARM Load Test
    needs: build
    strategy:
      fail-fast: false
      matrix:
        kernel:
          - "6.6-20260603.072225"
          # - "5.15-20260603.072225" not supported
    steps:
      - uses: actions/checkout@v4
      - name: Download eBPF object
        uses: actions/download-artifact@a9bc5e6ef2cb54c177f32aa5726adaa15e7e2d59 # v3.1.0
        with:
          name: netledger-bpf
          path: ./internal/agent/bpf/
      - name: Load NetLedger Agent in ${{ matrix.kernel }}-arm64
        uses: cilium/little-vm-helper@v0.0.30
        with:
          test-name: load-netledger
          image: "kind"
          arch: "arm64"
          cpu-kind: max
          image-version: ${{ matrix.kernel }}-arm64
          kernel-version: ${{ matrix.kernel }}
          host-mount: ${{ github.workspace }}
          install-dependencies: "true"
          ssh-connect-wait-timeout: "2"
          cmd: |
            set -euo pipefail

            # print kernel version
            echo "Kernel Version: "
            uname -a

            # goto where host is mounted
            echo ""
            cd /host
            ls -lah

            echo ""
            sudo bpftool prog loadall \
              ./internal/agent/bpf/netledger_bpfel.o \
              /sys/fs/bpf/netledger \
              2>&1 | tee /tmp/bpf-load.log

            sudo bpftool prog show

  image-push:
    runs-on: ubuntu-latest
    name: Image push
    needs: [build, load-vm-amd64, load-vm-arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Push images to GitHub Container Registry
        run: |
          docker push ${{ env.REPO }}/netledger-agent:${{ env.AGENT_VERSION }}
          docker push ${{ env.REPO }}/netledger-classifier:${{ env.CLASSIFIER_VERSION }}