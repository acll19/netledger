name: Netledger CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.25.1

      - name: Run tests
        run: make test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install LLVM and Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Verify tools
        run: |
          which clang
          which llvm-strip

      - name: Load versions from file
        id: versions
        run: |
          echo "AGENT_VERSION=$(cat versions.json | jq -r '.agent')" >> $GITHUB_ENV
          echo "CLASSIFIER_VERSION=$(cat versions.json | jq -r '.classifier')" >> $GITHUB_ENV
          echo "HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      
      - name: Build Agent
        run: |
          hash=$(git rev-parse --short HEAD)
          VERSION=$AGENT_VERSION HASH=$HASH make build-agent
      
      - name: Build Classifier
        run: |
          hash=$(git rev-parse --short HEAD)
          VERSION=$CLASSIFIER_VERSION HASH=$HASH make build-classifier
      
      - name: Push to GitHub Container Registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: |
            ghcr.io/acll19/netledger/netledger-agent:${AGENT_VERSION}
            ghcr.io/acll19/netledger/netledger-agent:${HASH}
            ghcr.io/acll19/netledger/netledger-classifier:${CLASSIFIER_VERSION}
            ghcr.io/acll19/netledger/netledger-classifier:${HASH}